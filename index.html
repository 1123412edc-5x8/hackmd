<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 HackMD 筆記與匿名交流空間</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent-color: #4a90e2; 
            --accent-hover: #357abd;
            --success-color: #2ec4b6;
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .section-block {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 24px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        /* 筆記連結樣式 */
        .note-link {
            display: block;
            padding: 16px;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .note-link:hover {
            border-color: var(--accent-color);
            background-color: rgba(74, 144, 226, 0.03);
            transform: translateX(4px);
        }

        /* 表單樣式 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #495057;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background-color: #fff;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.15);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 140px;
        }

        .submit-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        /* 提示標籤 */
        .anonymous-badge {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* 成功彈窗提示 */
        .success-message {
            display: none;
            background-color: rgba(46, 196, 182, 0.15);
            color: #1b7a70;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>💡 筆記交流空間</h1>
            <p>點擊下方閱讀 HackMD 筆記，並留下您最真實的匿名建議</p>
        </header>

        <div class="section-block">
            <h2>我的 HackMD 筆記</h2>
            
            <a href="https://hackmd.io/@你的帳號/筆記1" target="_blank" class="note-link">👉 筆記一：網頁前端開發入門</a>
            <a href="https://hackmd.io/@你的帳號/筆記2" target="_blank" class="note-link">👉 筆記二：Python 爬蟲實戰紀錄</a>
        </div>

        <div class="section-block">
            <h2>匿名意見箱</h2>
            <div class="anonymous-badge">🔒 系統已自動加密，此表單完全匿名，不會收集任何個人資料</div>
            
            <div class="success-message" id="successMsg">🎉 匿名建議已成功送出！感謝你的回饋 ❤</div>

            <form id="feedbackForm" action="https://formspree.io/f/你的表單ID" method="POST">
                
                <div class="form-group">
                    <label for="note-title">針對哪篇筆記？</label>
                    <select id="note-title" name="note_title" class="form-control" required>
                        <option value="" disabled selected>-- 請選擇相關筆記 --</option>
                        <option value="筆記一">筆記一：網頁前端開發入門</option>
                        <option value="筆記二">筆記二：Python 爬蟲實戰紀錄</option>
                        <option value="通用建議">通用建議 / 想對作者說的話</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="feedback">具體回饋與修正建議</label>
                    <textarea id="feedback" name="feedback" class="form-control" placeholder="請放心地寫下你想說的，不用擔心被發現是誰..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">安全匿名送出</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('feedbackForm');
        const successMsg = document.getElementById('successMsg');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async function(e) {
            e.preventDefault(); // 阻止網頁跳轉
            
            submitBtn.textContent = '正在安全傳送...';
            submitBtn.disabled = true;

            const formData = new FormData(form);

            try {
                const response = await fetch(form.action, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    successMsg.style.display = 'block'; // 顯示成功訊息
                    form.reset(); // 清空輸入框
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert('傳送失敗，請稍後再試。');
                }
            } catch (error) {
                alert('網路錯誤，請檢查連線。');
            } finally {
                submitBtn.textContent = '安全匿名送出';
                submitBtn.disabled = false;
            }
        });
    </script>

</body>
</html>
